<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Noticias Surf Islas Canarias</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">

<style>
:root{
  --azul:#046994;
}

body{
  margin:0;
  font-family:'Inter',sans-serif;
  background:#f5f5f5;
}

.header{
  background:linear-gradient(180deg,#046994,#023f5c);
  color:white;
  padding:20px;
}

.header-container{
  display:flex;
  justify-content:space-between;
  align-items:center;
}

.nav{
  display:flex;
  gap:15px;
}

.nav a{
  color:white;
  text-decoration:none;
}

.hero{
  text-align:center;
  padding:40px;
}

.section{
  max-width:1000px;
  margin:40px auto;
}

.card{
  background:white;
  border-radius:12px;
  overflow:hidden;
  box-shadow:0 5px 15px rgba(0,0,0,0.1);
  position:relative;
}

.card img{
  width:100%;
  height:200px;
  object-fit:cover;
  background:#ccc;
}

.card-content{
  padding:15px;
}

.nav-btn{
  position:absolute;
  top:50%;
  transform:translateY(-50%);
  background:rgba(0,0,0,0.6);
  color:white;
  border:none;
  font-size:20px;
  padding:10px;
  cursor:pointer;
}

.prev{ left:10px; }
.next{ right:10px; }

footer{
  text-align:center;
  padding:20px;
  background:#046994;
  color:white;
}
</style>
</head>

<body>

<!-- HEADER (html1) -->
<header class="header">
  <div class="header-container">
    <div>
      <h1>Surf Islas Canarias</h1>
      <p>Noticias del surf en Canarias y el mundo</p>
    </div>

    <nav class="nav">
      <a href="/">Inicio</a>
      <a href="/blog.html">Noticias</a>
      <a href="#">Islas</a>
      <a href="#">Eventos</a>
    </nav>
  </div>
</header>

<!-- HERO (html1) -->
<section class="hero">
  <h2>Actualidad del Surf 🌊</h2>
</section>

<!-- ================== CONTENIDO CENTRAL (html2 SIN TOCAR) ================== -->

<!-- FESURF -->
<section class="section">
<h2>FESURFING</h2>
<div class="card">
<button class="nav-btn prev" onclick="prev('fesurf')"><</button>
<button class="nav-btn next" onclick="next('fesurf')">></button>

<img id="fesurf-img">
<div class="card-content">
<h3 id="fesurf-title"></h3>
<a id="fesurf-link" target="_blank">Ver noticia</a>
</div>
</div>
</section>

<!-- WSL -->
<section class="section">
<h2>WSL</h2>
<div class="card">
<button class="nav-btn prev" onclick="prev('wsl')"><</button>
<button class="nav-btn next" onclick="next('wsl')">></button>

<img id="wsl-img">
<div class="card-content">
<h3 id="wsl-title"></h3>
<a id="wsl-link" target="_blank">Ver noticia</a>
</div>
</div>
</section>

<!-- FEDERACIONES -->
<section class="section">
<h2>Federaciones</h2>
<div class="card">
<button class="nav-btn prev" onclick="prev('fed')"><</button>
<button class="nav-btn next" onclick="next('fed')">></button>

<img id="fed-img">
<div class="card-content">
<h3 id="fed-title"></h3>
<a id="fed-link" target="_blank">Ver noticia</a>
</div>
</div>
</section>

<!-- FOOTER (html1) -->
<footer>
© 2026 Surf Islas Canarias
</footer>

<script>

/* ================= RSS ================= */

const feeds = {
  fesurf: "https://api.rss2json.com/v1/api.json?rss_url=https://www.fesurf.es/feed/",
  wsl: "https://api.rss2json.com/v1/api.json?rss_url=https://www.worldsurfleague.com/rss/news",
  fed: "https://api.rss2json.com/v1/api.json?rss_url=https://www.fcsurf.es/feed/"
};

let store = {
  fesurf: [],
  wsl: [],
  fed: []
};

let index = {
  fesurf:0,
  wsl:0,
  fed:0
};

/* ================= IMAGEN ================= */

function getImage(item){
  if(item.thumbnail && item.thumbnail !== "") return item.thumbnail;

  if(item.description){
    const match = item.description.match(/<img[^>]+src="([^">]+)"/);
    if(match) return match[1];
  }

  if(item.content){
    const match = item.content.match(/<img[^>]+src="([^">]+)"/);
    if(match) return match[1];
  }

  return "https://via.placeholder.com/800x400/046994/ffffff?text=Surf+News";
}

/* ================= LOAD ================= */

async function load(section){
  try{
    const res = await fetch(feeds[section]);
    const data = await res.json();

    store[section] = data.items.map(item => ({
      title: item.title,
      link: item.link,
      img: getImage(item)
    }));

    update(section);

  }catch(e){
    console.error(section, e);
  }
}

/* ================= RENDER ================= */

function render(section, img, title, link){
  const item = store[section][index[section]];
  if(!item) return;

  const image = document.getElementById(img);

  image.src = item.img;

  image.onerror = () => {
    image.src = "https://via.placeholder.com/800x400/000/fff?text=Surf";
  };

  document.getElementById(title).textContent = item.title;
  document.getElementById(link).href = item.link;
}

/* ================= CONTROL ================= */

function next(section){
  index[section]++;
  update(section);
}

function prev(section){
  index[section]--;
  update(section);
}

function update(section){
  const data = store[section];
  if(!data.length) return;

  if(index[section] >= data.length) index[section]=0;
  if(index[section] < 0) index[section]=data.length-1;

  if(section==="fesurf") render(section,"fesurf-img","fesurf-title","fesurf-link");
  if(section==="wsl") render(section,"wsl-img","wsl-title","wsl-link");
  if(section==="fed") render(section,"fed-img","fed-title","fed-link");
}

/* ================= AUTO ================= */

setInterval(()=>{
  next('fesurf');
  next('wsl');
  next('fed');
},5000);

/* ================= INIT ================= */

load('fesurf');
load('wsl');
load('fed');

</script>

</body>
</html>
