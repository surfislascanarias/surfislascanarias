<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Noticias Surf Islas Canarias</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="/assets/css/style.css">

<style>
.news-grid{
  display:grid;
  grid-template-columns: repeat(auto-fit, minmax(280px,1fr));
  gap:20px;
  margin-bottom:40px;
}

.news-card{
  background:white;
  border-radius:16px;
  overflow:hidden;
  box-shadow:0 10px 25px rgba(0,0,0,0.08);
  position:relative;
  transition:0.3s;
}

.news-card:hover{
  transform:translateY(-5px);
}

.news-card img{
  width:100%;
  height:160px;
  object-fit:contain;
  background:#f5f5f5;
  padding:20px;
}

.news-content{
  padding:18px;
}

.news-content h3{
  font-size:1rem;
  margin-bottom:15px;
  min-height:60px;
}

/* 🔥 BOTÓN PRO */
.news-btn{
  display:inline-block;
  padding:10px 18px;
  background:linear-gradient(135deg,#046994,#0b1c2c);
  color:white;
  border-radius:25px;
  font-size:0.85rem;
  font-weight:600;
  text-decoration:none;
  transition:0.3s;
}

.news-btn:hover{
  transform:scale(1.05);
  box-shadow:0 5px 15px rgba(0,0,0,0.2);
}

/* botones slider */
.nav-btn{
  position:absolute;
  top:50%;
  transform:translateY(-50%);
  background:rgba(0,0,0,0.6);
  color:white;
  border:none;
  font-size:18px;
  padding:8px;
  cursor:pointer;
  border-radius:50%;
  z-index:5;
}

.prev{ left:10px; }
.next{ right:10px; }

/* federaciones */
.fed-grid{
  display:grid;
  grid-template-columns: repeat(auto-fit, minmax(140px,1fr));
  gap:15px;
  margin-top:40px;
}

.fed-card{
  background:white;
  border-radius:12px;
  padding:15px;
  text-align:center;
  box-shadow:0 5px 15px rgba(0,0,0,0.08);
  transition:0.2s;
}

.fed-card:hover{
  transform:scale(1.05);
}

.fed-card img{
  width:60px;
  height:60px;
  object-fit:contain;
  margin-bottom:10px;
}

.fed-card a{
  text-decoration:none;
  color:#0b1c2c;
  font-weight:600;
  display:flex;
  flex-direction:column;
  align-items:center;
}
</style>
</head>

<body>

<header class="header">
  <div class="header-container">
    <div>
      <h1>Surf Islas Canarias</h1>
      <p>Noticias del surf en Canarias y el mundo</p>
    </div>
    <nav class="nav">
      <a href="/">Inicio</a>
      <a href="/blog.html">Noticias</a>
      <a href="/islas.html">Islas</a>
      <a href="/campeonatos.html">Campeonatos</a>
      <a href="/modalidades.html">Modalidades</a>
      <a href="/about.html">Sobre nosotros</a>
      <a href="/contact.html">Contacto</a>
    </nav>
  </div>
</header>

<!-- ================== NOTICIAS ================== -->
<section class="section">
<h2>Noticias Federaciones</h2>

<div class="news-grid">

<!-- FESURF -->
<div class="news-card">
  <button class="nav-btn prev" onclick="prev('fesurf')"><</button>
  <button class="nav-btn next" onclick="next('fesurf')">></button>

  <!-- 🔥 LOGO LOCAL -->
  <img src="/assets/img/logosfed/fesurf.jpg">

  <div class="news-content">
    <h3 id="fesurf-title"></h3>
    <a id="fesurf-link" class="news-btn" target="_blank">Leer noticia</a>
  </div>
</div>

<!-- FCSURF -->
<div class="news-card">
  <button class="nav-btn prev" onclick="prev('fcsurf')"><</button>
  <button class="nav-btn next" onclick="next('fcsurf')">></button>

  <!-- 🔥 LOGO LOCAL -->
  <img src="/assets/img/logosfed/canarias.jpg">

  <div class="news-content">
    <h3 id="fcsurf-title"></h3>
    <a id="fcsurf-link" class="news-btn" target="_blank">Leer noticia</a>
  </div>
</div>

</div>
</section>

<!-- ================== FEDERACIONES ================== -->
<section class="section">
<h2>Federaciones Regionales</h2>

<div class="fed-grid">

<div class="fed-card"><a href="https://www.federacionasturianadesurf.com" target="_blank"><img src="/assets/img/logosfed/asturias.jpg">Asturias</a></div>
<div class="fed-card"><a href="https://www.fgsurf.org/" target="_blank"><img src="/assets/img/logosfed/galicia.jpg">Galicia</a></div>
<div class="fed-card"><a href="https://www.federacioncantabradesurf.com/" target="_blank"><img src="/assets/img/logosfed/cantabria.jpg">Cantabria</a></div>
<div class="fed-card"><a href="https://fsrm.es/" target="_blank"><img src="/assets/img/logosfed/murcia.jpg">Murcia</a></div>
<div class="fed-card"><a href="https://www.facebook.com/AsociacionAndaluzaDeSurf" target="_blank"><img src="/assets/img/logosfed/andalucia.jpg">Andalucía</a></div>
<div class="fed-card"><a href="https://fsurf.cat/" target="_blank"><img src="/assets/img/logosfed/cataluña.jpg">Cataluña</a></div>

</div>
</section>

<footer>
© 2026 Surf Islas Canarias
</footer>

<script>
const feeds = {
  fesurf: "https://api.rss2json.com/v1/api.json?rss_url=https://www.fesurf.es/feed/",
  fcsurf: "https://api.rss2json.com/v1/api.json?rss_url=https://fcsurf.es/feed/"
};

let store = { fesurf: [], fcsurf: [] };
let index = { fesurf:0, fcsurf:0 };

async function load(section){
  const res = await fetch(feeds[section]);
  const data = await res.json();

  store[section] = data.items.slice(0,5).map(item => ({
    title: item.title,
    link: item.link
  }));

  render(section);
}

function render(section){
  const item = store[section][index[section]];
  if(!item) return;

  document.getElementById(section+"-title").textContent = item.title;
  document.getElementById(section+"-link").href = item.link;
}

function next(section){
  index[section]++;
  if(index[section]>=store[section].length) index[section]=0;
  render(section);
}

function prev(section){
  index[section]--;
  if(index[section]<0) index[section]=store[section].length-1;
  render(section);
}

// auto slide
setInterval(()=>{
  next('fesurf');
  next('fcsurf');
},5000);

// refresco noticias
setInterval(()=>{
  load('fesurf');
  load('fcsurf');
},300000);

load('fesurf');
load('fcsurf');
</script>

</body>
</html>
