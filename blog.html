<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Noticias - Surf Islas Canarias</title>

<style>
/* ========================== Estilos Generales ========================== */
body {
  font-family: 'Inter', sans-serif;
  background: #fdfdfd;
  color: #0f172a;
  margin: 0;
}
a { color:#046994; text-decoration:none; }
a:hover { text-decoration:underline; }

.header {
  background:#046994;
  color:white;
  padding:32px 16px;
  text-align:center;
}
.header h1 { margin:0; font-size:2rem; }
.header p { margin-top:8px; }

.nav { display:flex; justify-content:center; gap:12px; flex-wrap:wrap; margin-top:12px; }
.nav a { padding:8px 12px; background:rgba(255,255,255,0.08); color:white; border-radius:6px; font-weight:500; }

.container { max-width:1200px; margin:28px auto; padding:0 16px; }

/* ========================== Secciones ========================== */

.news-section { margin-bottom:60px; }
.news-section h2 {
  font-size:1.6rem;
  margin-bottom:18px;
  border-left:5px solid #FF6B35;
  padding-left:12px;
}

/* ========================== Carousel ========================== */

.carousel {
  display:flex;
  gap:14px;
  overflow-x:auto;
  scroll-behavior:smooth;
  padding-bottom:8px;
}

.carousel::-webkit-scrollbar { height:8px; }
.carousel::-webkit-scrollbar-thumb { background:#FF6B35; border-radius:4px; }
.carousel::-webkit-scrollbar-track { background:#eee; }

.news-card {
  background:white;
  border-radius:12px;
  box-shadow:0 6px 20px rgba(0,0,0,0.08);
  min-width:280px;
  flex:0 0 auto;
  overflow:hidden;
}
.news-card img {
  width:100%;
  height:180px;
  object-fit:cover;
}
.news-content {
  padding:12px 14px;
}
.news-source {
  font-size:12px;
  font-weight:700;
  color:#FF6B35;
  margin-bottom:6px;
}
.news-title {
  font-size:1rem;
  font-weight:700;
  margin-bottom:6px;
}
.news-link {
  font-size:0.9rem;
  font-weight:600;
  color:#046994;
}
</style>
</head>
<body>

<header class="header">
  <h1>Surf Islas Canarias</h1>
  <p>Noticias del surf en Canarias, España y el circuito internacional</p>
  <nav class="nav">
    <a href="index.html">Inicio</a>
    <a href="noticias.html" class="active">Noticias</a>
    <a href="spots.html">Islas</a>
    <a href="eventos.html">Eventos & Calendario</a>
    <a href="modalidades.html">Modalidades</a>
  </nav>
</header>

<main class="container">

  <section class="news-section">
    <h2>Federación Española de Surfing (FESURF)</h2>
    <div class="carousel" id="carousel-fesurf"></div>
  </section>

  <section class="news-section">
    <h2>World Surf League (WSL)</h2>
    <div class="carousel" id="carousel-wsl"></div>
  </section>

  <section class="news-section">
    <h2>Federaciones Autonómicas</h2>
    <div class="carousel" id="carousel-federations"></div>
  </section>

</main>

<footer class="footer" style="text-align:center;padding:20px 16px;background:#046994;color:white;">
  © 2026 Surf Islas Canarias
</footer>

<script>
/* ======================== Helpers ======================== */

async function fetchRSS(feedUrl) {
  try {
    const proxy = "https://api.allorigins.win/raw?url=";
    const res = await fetch(proxy + encodeURIComponent(feedUrl));
    const text = await res.text();
    return new window.DOMParser().parseFromString(text, "text/xml");
  } catch (err) {
    console.error("Error al cargar RSS:", err);
    return null;
  }
}

function getValue(node, tag) {
  const el = node.querySelector(tag);
  return el ? el.textContent : "";
}

function getImageFromItem(item) {
  // Intenta <media:content>, <media:thumbnail>
  const media = item.querySelector("media\\:content, content, media\\:thumbnail, thumbnail");
  if (media && media.getAttribute("url")) return media.getAttribute("url");
  // Open Graph
  const desc = getValue(item, "description");
  const match = desc.match(/<img.*?src=["'](.*?)["']/);
  return match ? match[1] : "";
}

function renderCarousel(xml, elementId, sourceName) {
  if (!xml) return;
  const items = xml.querySelectorAll("item");
  const container = document.getElementById(elementId);

  for (let i = 0; i < Math.min(4, items.length); i++) {
    const item = items[i];
    const title = getValue(item, "title");
    const link = getValue(item, "link");
    const imgSrc = getImageFromItem(item) || "https://via.placeholder.com/400x250?text=Noticia";

    const card = document.createElement("div");
    card.className = "news-card";
    card.innerHTML = `
      <img src="${imgSrc}" alt="${title}">
      <div class="news-content">
        <div class="news-source">${sourceName}</div>
        <div class="news-title">${title}</div>
        <a class="news-link" href="${link}" target="_blank">Leer noticia →</a>
      </div>
    `;
    container.appendChild(card);
  }
}

/* ======================== Fuentes ======================== */

// FESURF
fetchRSS("https://www.fesurf.es/feed/")
  .then(xml => renderCarousel(xml, "carousel-fesurf", "FESURF"));

// WSL
fetchRSS("https://www.worldsurfleague.com/rss/news")
  .then(xml => renderCarousel(xml, "carousel-wsl", "WSL"));

// Federaciones Autonómicas (todas en uno)
Promise.all([
  fetchRSS("https://www.fcsurf.es/feed/"),       // FCS (Canarias)
  fetchRSS("https://fgsurf.gal/feed/"),          // FGS (Galicia)
  fetchRSS("https://fspa.es/feed/"),             // FSPA (Asturias)
  fetchRSS("https://www.fscv.es/feed/"),         // FSCV (Valenciana)
  fetchRSS("https://www.fasurf.com/feed/"),      // FAS (Andalucía)
  fetchRSS("https://www.fmsurf.es/feed/"),       // FMS (Murcia/Melilla)
  fetchRSS("https://www.euskadisurf.eus/feed/")  // ESF (País Vasco)
]).then(results => {
  results.forEach((xml, idx) => {
    if (xml) {
      // etiqueta de cada feed
      let name = "Federación";
      switch (idx) {
        case 0: name = "FCS"; break;
        case 1: name = "FGS"; break;
        case 2: name = "FSPA"; break;
        case 3: name = "FSCV"; break;
        case 4: name = "FAS"; break;
        case 5: name = "FMSURF"; break;
        case 6: name = "ESF"; break;
      }
      renderCarousel(xml, "carousel-federations", name);
    }
  });
});
</script>

</body>
</html>
