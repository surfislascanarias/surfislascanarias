<!DOCTYPE html>
<html lang="es">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Noticias Surf | Surf Islas Canarias</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">

<link rel="stylesheet" href="assets/css/style.css">

<style>

body{
font-family:Inter;
}

.news-section{
margin:60px 0;
}

.news-section h2{
font-size:28px;
color:#046994;
border-left:6px solid #ff6b35;
padding-left:10px;
margin-bottom:25px;
}

/* CAROUSEL */

.carousel{
overflow:hidden;
position:relative;
}

.carousel-track{
display:flex;
gap:20px;
transition:transform .5s ease;
}

.news-card{
min-width:280px;
background:white;
border-radius:12px;
box-shadow:0 10px 25px rgba(0,0,0,.08);
overflow:hidden;
}

.news-card img{
width:100%;
height:180px;
object-fit:cover;
}

.news-content{
padding:15px;
}

.news-source{
font-size:12px;
font-weight:700;
color:#ff6b35;
margin-bottom:6px;
}

.news-title{
font-size:16px;
font-weight:700;
margin-bottom:10px;
}

.news-link{
text-decoration:none;
color:#046994;
font-weight:600;
font-size:14px;
}

.news-link:hover{
text-decoration:underline;
}

</style>

</head>

<body>

<header class="header">

<h1>Surf Islas Canarias</h1>
<p>Noticias del surf en Canarias y el mundo</p>

<nav class="nav">

<a href="index.html">Inicio</a>
<a href="noticias.html">Noticias</a>
<a href="spots.html">Islas</a>
<a href="eventos.html">Eventos & Calendario</a>
<a href="modalidades.html">Modalidades</a>
<a href="about.html">Sobre Surf Islas Canarias</a>
<a href="contact.html">Contacto</a>

</nav>

</header>

<main class="container">

<!-- FESURF -->

<section class="news-section">

<h2>FESURF</h2>

<div class="carousel">
<div class="carousel-track" id="fesurf-news"></div>
</div>

</section>


<!-- WSL -->

<section class="news-section">

<h2>World Surf League</h2>

<div class="carousel">
<div class="carousel-track" id="wsl-news"></div>
</div>

</section>


<!-- FEDERACIONES -->

<section class="news-section">

<h2>Federaciones Autonómicas</h2>

<div class="carousel">
<div class="carousel-track" id="federaciones-news"></div>
</div>

</section>

</main>


<footer class="footer">
© 2026 Surf Islas Canarias
</footer>


<script>

/* FUNCION CREAR CARD */

function createCard(article,source){

return `
<div class="news-card">

<img src="${article.thumbnail || 'https://images.unsplash.com/photo-1507525428034-b723cf961d3e'}">

<div class="news-content">

<div class="news-source">${source}</div>

<div class="news-title">${article.title}</div>

<a href="${article.link}" target="_blank" class="news-link">
Leer noticia →
</a>

</div>

</div>
`

}


/* CARGAR RSS */

async function loadRSS(rss,id,source){

const url=`https://api.rss2json.com/v1/api.json?rss_url=${rss}`

const res=await fetch(url)

const data=await res.json()

const container=document.getElementById(id)

data.items.slice(0,8).forEach(article=>{

container.innerHTML+=createCard(article,source)

})

startCarousel(container)

}


/* CAROUSEL AUTO */

function startCarousel(track){

let position=0

setInterval(()=>{

position+=300

if(position>track.scrollWidth/2){
position=0
}

track.style.transform=`translateX(-${position}px)`

},4000)

}


/* CARGAR SECCIONES */

loadRSS(
"https://www.fesurf.es/feed",
"fesurf-news",
"FESURF"
)

loadRSS(
"https://www.worldsurfleague.com/rss/news",
"wsl-news",
"WSL"
)

loadRSS(
"https://www.fcsurf.es/feed",
"federaciones-news",
"FCF"
)

</script>

</body>
</html>
