<!DOCTYPE html>
<html lang="es">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Noticias | Surf Islas Canarias</title>

<link rel="stylesheet" href="assets/css/style.css">

<style>

.news-section{
margin:60px 0;
}

.news-section h2{
font-size:28px;
margin-bottom:20px;
border-left:5px solid #ff6b35;
padding-left:10px;
}

/* GRID */

.federaciones-grid{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(260px,1fr));
gap:25px;
}

/* CARD */

.news-card{

background:white;
border-radius:10px;
overflow:hidden;
box-shadow:0 10px 25px rgba(0,0,0,0.08);

}

.news-card img{
width:100%;
height:180px;
object-fit:cover;
}

.news-content{
padding:15px;
}

.news-source{
font-size:12px;
font-weight:bold;
color:#ff6b35;
margin-bottom:5px;
}

.news-title{
font-size:16px;
font-weight:700;
margin-bottom:10px;
}

.news-link{
text-decoration:none;
color:#046994;
font-weight:600;
}

</style>

</head>

<body>

<header class="header">

<h1>Surf Islas Canarias</h1>

<nav class="nav">
<a href="index.html">Inicio</a>
<a href="noticias.html">Noticias</a>
<a href="spots.html">Islas</a>
<a href="eventos.html">Eventos & Calendario</a>
<a href="modalidades.html">Modalidades</a>
</nav>

</header>


<main class="container">


<!-- FESURF -->

<section class="news-section">

<h2>FESURF</h2>

<div class="news-card" id="fesurf-card"></div>

</section>


<!-- WSL -->

<section class="news-section">

<h2>World Surf League</h2>

<div class="news-card" id="wsl-card"></div>

</section>


<!-- FEDERACIONES -->

<section class="news-section">

<h2>Federaciones Autonómicas</h2>

<div class="federaciones-grid">

<div class="news-card" id="fcs-card"></div>

<div class="news-card" id="fgs-card"></div>

<div class="news-card" id="fms-card"></div>

<div class="news-card" id="ectc-card"></div>

</div>

</section>

</main>


<footer class="footer">
© 2026 Surf Islas Canarias
</footer>



<script>

/* CREAR CARD */

function renderNews(container,news,source){

container.innerHTML=`

<img src="${news.thumbnail || 'https://images.unsplash.com/photo-1507525428034-b723cf961d3e'}">

<div class="news-content">

<div class="news-source">${source}</div>

<div class="news-title">${news.title}</div>

<a href="${news.link}" target="_blank" class="news-link">
Leer noticia →
</a>

</div>

`

}


/* CARGAR RSS */

async function loadNews(rss,containerId,source){

const url=`https://api.rss2json.com/v1/api.json?rss_url=${rss}`

const res=await fetch(url)

const data=await res.json()

const container=document.getElementById(containerId)

const articles=data.items.slice(0,4)

let index=0

renderNews(container,articles[index],source)

setInterval(()=>{

index++

if(index>=articles.length){
index=0
}

renderNews(container,articles[index],source)

},4000)

}


/* FUENTES */

loadNews(
"https://www.fesurf.es/feed",
"fesurf-card",
"FESURF"
)

loadNews(
"https://www.worldsurfleague.com/rss/news",
"wsl-card",
"WSL"
)

loadNews(
"https://www.fcsurf.es/feed",
"fcs-card",
"FCS"
)

loadNews(
"https://federaciongallegasurf.gal/feed",
"fgs-card",
"FGS"
)

loadNews(
"https://fmsurf.org/feed",
"fms-card",
"FMS"
)

loadNews(
"https://federacioncantabrasurf.com/feed",
"ectc-card",
"ECTC"
)

</script>

</body>
</html>
