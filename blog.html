<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Noticias Surf Islas Canarias</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">

<style>
:root{
  --azul:#046994;
  --accent:#FF6B35;
}

body{
  margin:0;
  font-family:'Inter',sans-serif;
  background:#f5f5f5;
}

.header{
  background:linear-gradient(180deg,#046994,#023f5c);
  color:white;
  padding:20px;
}

.header-container{
  display:flex;
  justify-content:space-between;
  align-items:center;
}

.nav{
  display:flex;
  gap:15px;
}

.nav a{
  color:white;
  text-decoration:none;
}

.hero{
  text-align:center;
  padding:40px;
}

.section{
  max-width:1000px;
  margin:40px auto;
}

.card{
  background:white;
  border-radius:12px;
  overflow:hidden;
  box-shadow:0 5px 15px rgba(0,0,0,0.1);
  position:relative;
}

.card img{
  width:100%;
  height:200px;
  object-fit:cover;
  background:#ddd;
}

.card-content{
  padding:15px;
}

.card h3{
  font-size:1rem;
}

.nav-btn{
  position:absolute;
  top:50%;
  transform:translateY(-50%);
  background:rgba(0,0,0,0.6);
  color:white;
  border:none;
  font-size:20px;
  padding:10px;
  cursor:pointer;
}

.prev{ left:10px; }
.next{ right:10px; }

footer{
  text-align:center;
  padding:20px;
  background:#046994;
  color:white;
}
</style>
</head>

<body>

<header class="header">
  <div class="header-container">
    <div>
      <h1>Surf Islas Canarias</h1>
      <p>Noticias del surf en Canarias y el mundo</p>
    </div>

    <nav class="nav">
      <a href="/">Inicio</a>
      <a href="/blog.html">Noticias</a>
      <a href="/islas.html">Islas</a>
      <a href="/campeonatos.html">Eventos & Calendario</a>
      <a href="/modalidades.html">Modalidades</a>
    </nav>
  </div>
</header>

<section class="hero">
  <h2>Actualidad del Surf 🌊</h2>
</section>

<!-- FESURF -->
<section class="section">
<h2>FESURFING</h2>

<div class="card">
<button class="nav-btn prev" onclick="prev('fesurf')"><</button>
<button class="nav-btn next" onclick="next('fesurf')">></button>

<img id="fesurf-img">
<div class="card-content">
<h3 id="fesurf-title"></h3>
<a id="fesurf-link" target="_blank">Ver noticia</a>
</div>
</div>
</section>

<!-- WSL -->
<section class="section">
<h2>WSL</h2>

<div class="card">
<button class="nav-btn prev" onclick="prev('wsl')"><</button>
<button class="nav-btn next" onclick="next('wsl')">></button>

<img id="wsl-img">
<div class="card-content">
<h3 id="wsl-title"></h3>
<a id="wsl-link" target="_blank">Ver noticia</a>
</div>
</div>
</section>

<!-- FEDERACIONES -->
<section class="section">
<h2>Federaciones Autonómicas</h2>

<div class="card">
<button class="nav-btn prev" onclick="prev('federaciones')"><</button>
<button class="nav-btn next" onclick="next('federaciones')">></button>

<img id="fed-img">
<div class="card-content">
<h3 id="fed-title"></h3>
<a id="fed-link" target="_blank">Ver noticia</a>
</div>
</div>
</section>

<footer>
© 2026 Surf Islas Canarias
</footer>

<script>

/* ================= DATOS REALES ================= */

const fesurf = [
{
title:"España brilla en el EuroSurf 2024",
link:"https://www.fesurf.es/espana-brilla-en-el-eurosurf-2024/",
img:"https://www.fesurf.es/wp-content/uploads/2024/07/Eurosurf-2024-team.jpg"
},
{
title:"La FESURF impulsa el surf femenino",
link:"https://www.fesurf.es/fesurf-impulsa-el-surf-femenino/",
img:"https://www.fesurf.es/wp-content/uploads/2024/06/surf-femenino.jpg"
}
];

const wsl = [
{
title:"Italo Ferreira gana en Tahití",
link:"https://www.worldsurfleague.com/posts/531245/italo-ferreira-wins-tahiti-pro",
img:"https://www.worldsurfleague.com/sites/default/files/styles/post_image/public/2024-08/tahiti-pro-italo.jpg"
},
{
title:"Ranking WSL actualizado",
link:"https://www.worldsurfleague.com/rankings",
img:"https://www.worldsurfleague.com/sites/default/files/styles/large/public/2025-01/wsl-ranking.jpg"
}
];

const federaciones = [
{
title:"Campeonato de Canarias de Surf 2024",
link:"https://www.fcsurf.es/campeonato-canarias-surf-2024/",
img:"https://www.fcsurf.es/wp-content/uploads/2024/05/campeonato-canarias.jpg"
},
{
title:"Galicia acoge prueba nacional de surf",
link:"https://www.fgsurf.org/galicia-prueba-nacional-surf/",
img:"https://www.fgsurf.org/wp-content/uploads/2024/06/prueba-galicia.jpg"
},
{
title:"Cantabria impulsa cantera del surf",
link:"https://www.federacioncantabradesurf.com/cantera-surf-cantabria/",
img:"https://www.federacioncantabradesurf.com/wp-content/uploads/2024/04/cantera.jpg"
},
{
title:"Andalucía refuerza circuito autonómico",
link:"https://federacionandaluzadesurf.com/circuito-andaluz-surf/",
img:"https://federacionandaluzadesurf.com/wp-content/uploads/2024/03/circuito.jpg"
}
];

/* ================= CONTROL ================= */

let index = {
fesurf:0,
wsl:0,
federaciones:0
};

function render(section, data, img, title, link){
const imageElement = document.getElementById(img);

imageElement.src = data[index[section]].img;

// fallback si falla imagen
imageElement.onerror = () => {
imageElement.src = "https://via.placeholder.com/800x400?text=Surf+News";
};

document.getElementById(title).textContent = data[index[section]].title;
document.getElementById(link).href = data[index[section]].link;
}

function next(section){
index[section]++;
update(section);
}

function prev(section){
index[section]--;
update(section);
}

function update(section){
let data = eval(section);

if(index[section] >= data.length) index[section]=0;
if(index[section] < 0) index[section]=data.length-1;

if(section==="fesurf") render(section,data,"fesurf-img","fesurf-title","fesurf-link");
if(section==="wsl") render(section,data,"wsl-img","wsl-title","wsl-link");
if(section==="federaciones") render(section,data,"fed-img","fed-title","fed-link");
}

/* AUTO ROTACIÓN */
setInterval(()=>{
next('fesurf');
next('wsl');
next('federaciones');
},5000);

/* INIT */
update('fesurf');
update('wsl');
update('federaciones');

</script>

</body>
</html>
