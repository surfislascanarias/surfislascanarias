<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Noticias Surf Islas Canarias</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="/assets/css/style.css">

<style>
/* =================== GRID NOTICIAS =================== */
.news-grid{
  display:grid;
  grid-template-columns: repeat(auto-fit, minmax(300px,1fr));
  gap:20px;
  margin-bottom:40px;
}

/* ===== CARD NOTICIAS ===== */
.news-card{
  background:white;
  border-radius:14px;
  overflow:hidden;
  box-shadow:0 8px 20px rgba(0,0,0,0.08);
  position:relative;
  transition:0.3s;
}

.news-card:hover{
  transform:translateY(-5px);
}

.news-card img{
  width:100%;
  height:200px;
  object-fit:cover;
  background:#ccc;
}

.news-content{
  padding:15px;
}

.news-content h3{
  font-size:0.95rem;
  margin-bottom:10px;
}

.news-content a{
  text-decoration:none;
  color:#046994;
  font-weight:600;
}

/* ===== BOTONES SLIDE ===== */
.nav-btn{
  position:absolute;
  top:50%;
  transform:translateY(-50%);
  background:rgba(0,0,0,0.6);
  color:white;
  border:none;
  font-size:20px;
  padding:10px;
  cursor:pointer;
  z-index:5;
}

.prev{ left:10px; }
.next{ right:10px; }

/* ===== GRID FEDERACIONES ===== */
.fed-grid{
  display:grid;
  grid-template-columns: repeat(auto-fit, minmax(160px,1fr));
  gap:15px;
  margin-top:40px;
}

.fed-card{
  background:white;
  border-radius:12px;
  padding:15px;
  text-align:center;
  box-shadow:0 5px 15px rgba(0,0,0,0.08);
  transition:0.2s;
}

.fed-card:hover{
  transform:scale(1.05);
}

.fed-card img{
  width:80px;
  height:80px;
  object-fit:contain;
  margin-bottom:10px;
}

.fed-card a{
  text-decoration:none;
  color:#0b1c2c;
  font-weight:600;
  font-size:0.9rem;
}
</style>
</head>
<body>

<!-- HEADER -->
<header class="header">
  <div class="header-container">
    <div>
      <h1>Surf Islas Canarias</h1>
      <p>Noticias del surf en Canarias y el mundo</p>
    </div>
    <nav class="nav" id="navMenu">
      <a href="/">Inicio</a>
      <a href="/blog.html">Noticias</a>
      <a href="/islas.html">Islas</a>
      <a href="/campeonatos.html">Campeonatos</a>
      <a href="/modalidades.html">Modalidades</a>
      <a href="/about.html">Sobre nosotros</a>
      <a href="/contact.html">Contacto</a>
    </nav>
  </div>
</header>

<!-- ================== SECCIÓN 1: NOTICIAS ================== -->
<section class="section">
<h2>Noticias Federaciones</h2>
<div class="news-grid">

<!-- FESURF -->
<div class="news-card">
  <button class="nav-btn prev" onclick="prev('fesurf')"><</button>
  <button class="nav-btn next" onclick="next('fesurf')">></button>
  <img id="fesurf-img" onerror="this.src='https://via.placeholder.com/800x400/046994/ffffff?text=Surf+News'">
  <div class="news-content">
    <h3 id="fesurf-title"></h3>
    <a id="fesurf-link" target="_blank">Ver noticia</a>
  </div>
</div>

<!-- FCSURF -->
<div class="news-card">
  <button class="nav-btn prev" onclick="prev('fcsurf')"><</button>
  <button class="nav-btn next" onclick="next('fcsurf')">></button>
  <img id="fcsurf-img" onerror="this.src='https://via.placeholder.com/800x400/046994/ffffff?text=Surf+News'">
  <div class="news-content">
    <h3 id="fcsurf-title"></h3>
    <a id="fcsurf-link" target="_blank">Ver noticia</a>
  </div>
</div>

</div>
</section>

<!-- ================== SECCIÓN 2: FEDERACIONES REGIONALES ================== -->
<section class="section">
<h2>Federaciones Regionales</h2>
<div class="fed-grid">

<div class="fed-card">
  <a href="https://www.federacionasturianadesurf.com" target="_blank">
    <img src="/assets/img/logosfed/asturias.jpg">
    Asturias
  </a>
</div>

<div class="fed-card">
  <a href="https://www.fgsurf.org/" target="_blank">
    <img src="/assets/img/logosfed/galicia.jpg">
    Galicia
  </a>
</div>

<div class="fed-card">
  <a href="https://www.federacioncantabradesurf.com/" target="_blank">
    <img src="/assets/img/logosfed/cantabria.jpg">
    Cantabria
  </a>
</div>

<div class="fed-card">
  <a href="https://fsrm.es/" target="_blank">
    <img src="/assets/img/logosfed/murcia.jpg">
    Murcia
  </a>
</div>

<div class="fed-card">
  <a href="https://www.facebook.com/AsociacionAndaluzaDeSurf" target="_blank">
    <img src="/assets/img/logosfed/andalucia.jpg">
    Andalucía
  </a>
</div>

<div class="fed-card">
  <a href="https://fsurf.cat/" target="_blank">
    <img src="/assets/img/logosfed/cataluña.jpg">
    Cataluña
  </a>
</div>

</div>
</section>

<footer>
© 2026 Surf Islas Canarias
</footer>

<script>
const feeds = {
  fesurf: "https://api.rss2json.com/v1/api.json?rss_url=https://www.fesurf.es/feed/",
  fcsurf: "https://api.rss2json.com/v1/api.json?rss_url=https://fcsurf.es/feed/"
};

let store = { fesurf: [], fcsurf: [] };
let index = { fesurf:0, fcsurf:0 };

// fallback si no hay imagen
function fallback(){
  return "https://via.placeholder.com/800x400/046994/ffffff?text=Surf+News";
}

// obtener imagen real desde RSS
function getImage(item){
  if(item.thumbnail) return item.thumbnail;
  const html = item.description || item.content;
  if(html){
    const match = html.match(/<img[^>]+src="([^">]+)"/);
    if(match) return match[1];
  }
  return fallback();
}

// carga últimas 5 noticias
async function load(section){
  try{
    const res = await fetch(feeds[section]);
    const data = await res.json();
    store[section] = data.items.slice(0,5).map(item => ({
      title: item.title,
      link: item.link,
      img: getImage(item)
    }));
    index[section] = 0;
    render(section);
  }catch(e){
    console.error(section,e);
  }
}

// renderizar noticia actual
function render(section){
  const item = store[section][index[section]];
  if(!item) return;
  const image = document.getElementById(section+"-img");
  image.src = item.img;
  image.onerror = ()=>{image.src=fallback()};
  document.getElementById(section+"-title").textContent = item.title;
  document.getElementById(section+"-link").href = item.link;
}

// control botones
function next(section){
  index[section]++;
  if(index[section]>=store[section].length) index[section]=0;
  render(section);
}
function prev(section){
  index[section]--;
  if(index[section]<0) index[section]=store[section].length-1;
  render(section);
}

// slide automático
setInterval(()=>{
  next('fesurf');
  next('fcsurf');
},5000);

// recarga cada 5 minutos para tener últimas noticias
setInterval(()=>{
  load('fesurf');
  load('fcsurf');
},300000);

// iniciar
load('fesurf');
load('fcsurf');
</script>

</body>
</html>
