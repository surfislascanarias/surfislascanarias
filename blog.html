<!DOCTYPE html>
<html lang="es">
<head>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="/assets/css/style.css">

<style>
.news-grid{
  display:grid;
  grid-template-columns: repeat(auto-fit, minmax(280px,1fr));
  gap:20px;
  margin-bottom:40px;
}

.news-card{
  background:white;
  border-radius:14px;
  overflow:hidden;
  box-shadow:0 8px 20px rgba(0,0,0,0.08);
  position:relative;
}

.news-card img{
  width:100%;
  height:200px;
  object-fit:cover;
}

.news-content{
  padding:15px;
}

.nav-btn{
  position:absolute;
  top:50%;
  transform:translateY(-50%);
  background:rgba(0,0,0,0.6);
  color:white;
  border:none;
  font-size:20px;
  padding:10px;
  cursor:pointer;
  border-radius:50%;
}

.prev{ left:10px; }
.next{ right:10px; }

.fed-grid{
  display:grid;
  grid-template-columns: repeat(auto-fit, minmax(140px,1fr));
  gap:15px;
  margin-top:40px;
}

.fed-card{
  background:white;
  border-radius:12px;
  padding:15px;
  text-align:center;
  box-shadow:0 5px 15px rgba(0,0,0,0.08);
}

.fed-card img{
  width:60px;
  height:60px;
  object-fit:contain;
  margin-bottom:10px;
}

.fed-card a{
  text-decoration:none;
  color:#0b1c2c;
  font-weight:600;
  display:flex;
  flex-direction:column;
  align-items:center;
}
</style>
</head>

    <nav class="nav">
      <a href="/">Inicio</a>
      <a href="/blog.html">Noticias</a>
      <a href="/islas.html">Islas</a>
      <a href="/campeonatos.html">Campeonatos</a>
      <a href="/modalidades.html">Modalidades</a>
      <a href="/about.html">Sobre nosotros</a>
      <a href="/contact.html">Contacto</a>
    </nav>
  </div>
</header>

<section class="section">
<h2>Noticias Federaciones</h2>

<div class="news-grid">

<!-- FESURF -->
<div class="news-card">
  <button class="nav-btn prev" onclick="prev('fesurf')"><</button>

  </div>
</div>

<!-- FCSURF -->
<div class="news-card">
  <button class="nav-btn prev" onclick="prev('fcsurf')"><</button>
  <button class="nav-btn next" onclick="next('fcsurf')">></button>
  <img id="fcsurf-img" onerror="this.src='https://via.placeholder.com/800x400/046994/ffffff?text=Surf+News'">
  <div class="news-content">
    <h3 id="fcsurf-title"></h3>
    <a id="fcsurf-link" target="_blank">Ver noticia</a>
  </div>
</div>

</div>

<section class="section">
<h2>Federaciones Regionales</h2>

<div class="fed-grid">

<div class="fed-card"><a href="https://www.federacionasturianadesurf.com" target="_blank"><img src="/assets/img/logosfed/asturias.jpg">Asturias</a></div>
<div class="fed-card"><a href="https://www.fgsurf.org/" target="_blank"><img src="/assets/img/logosfed/galicia.jpg">Galicia</a></div>
<div class="fed-card"><a href="https://www.federacioncantabradesurf.com/" target="_blank"><img src="/assets/img/logosfed/cantabria.jpg">Cantabria</a></div>
<div class="fed-card"><a href="https://fsrm.es/" target="_blank"><img src="/assets/img/logosfed/murcia.jpg">Murcia</a></div>
<div class="fed-card"><a href="https://www.facebook.com/AsociacionAndaluzaDeSurf" target="_blank"><img src="/assets/img/logosfed/andalucia.jpg">Andalucía</a></div>
<div class="fed-card"><a href="https://fsurf.cat/" target="_blank"><img src="/assets/img/logosfed/cataluña.jpg">Cataluña</a></div>

</div>

<footer>
© 2026 Surf Islas Canarias
</footer>

<script>
const feeds = {
  fesurf: "https://api.rss2json.com/v1/api.json?rss_url=https://www.fesurf.es/feed/",
  fcsurf: "https://api.rss2json.com/v1/api.json?rss_url=https://fcsurf.es/feed/"
};

let store = { fesurf: [], fcsurf: [] };
let index = { fesurf:0, fcsurf:0 };

function fallback(){
  return "https://via.placeholder.com/800x400/046994/ffffff?text=Surf+News";
}

// 🔥 FUNCIÓN DEFINITIVA FESURF FIX
function getImage(item){
  let url = null;

  function isImage(u){
    return u && (u.match(/\.(jpg|jpeg|png|webp)$/i));
  }

  // 1️⃣ enclosure válido
  if(item.enclosure && isImage(item.enclosure.link)){
    url = item.enclosure.link;
  }

  // 2️⃣ buscar en content
  if(!url){
    const html = item.content || item.description;
    if(html){
      const match = html.match(/<img[^>]+src="([^">]+)"/);
      if(match && isImage(match[1])){
        url = match[1];
      }
    }
  }

  // 3️⃣ thumbnail válido
  if(!url && isImage(item.thumbnail)){
    url = item.thumbnail;
  }

  if(!url) return fallback();

  // arreglar relativas
  if(url.startsWith("/")){
    if(item.link.includes("fesurf.es")){
      url = "https://www.fesurf.es" + url;
    }
    if(item.link.includes("fcsurf.es")){
      url = "https://fcsurf.es" + url;
    }
  }

  url = url.split("?")[0];
  url = url.replace("http://","https://");

  return "https://images.weserv.nl/?url=" + encodeURIComponent(url);
}

async function load(section){
  try{
    const res = await fetch(feeds[section]);
    const data = await res.json();

    store[section] = data.items.slice(0,5).map(item => ({
      title: item.title,
      link: item.link,
      img: getImage(item)
    }));

    index[section]=0;
    render(section);

  }catch(e){
    console.error(e);
  }
}

function render(section){
  const item = store[section][index[section]];
  if(!item) return;

  const img = document.getElementById(section+"-img");
  img.src = item.img;
  img.onerror = ()=> img.src = fallback();

  document.getElementById(section+"-title").textContent = item.title;
  document.getElementById(section+"-link").href = item.link;
}

function next(section){
  index[section]++;
  if(index[section]>=store[section].length) index[section]=0;
  render(section);
}

function prev(section){
  index[section]--;
  if(index[section]<0) index[section]=store[section].length-1;
  render(section);
}

// auto slide
setInterval(()=>{
  next('fesurf');
  next('fcsurf');
},5000);

// refresh cada 5 min
setInterval(()=>{
  load('fesurf');
  load('fcsurf');
},300000);

load('fesurf');
load('fcsurf');
</script>

</body>
</html>
