<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Noticias Surf Islas Canarias</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="/assets/css/style.css">

<style>
/* ===== GRID NOTICIAS ===== */
.news-grid{
  display:grid;
  grid-template-columns: repeat(auto-fit, minmax(300px,1fr));
  gap:25px;
  margin-bottom:50px;
}

.news-card{
  background:white;
  border-radius:18px;
  overflow:hidden;
  box-shadow:0 12px 25px rgba(0,0,0,0.08);
  position:relative;
  transition:0.3s;
  display:flex;
  flex-direction:column;
  align-items:center;
}

.news-card:hover{
  transform:translateY(-5px);
}

.news-card img{
  width:80%;
  height:180px;
  object-fit:contain;
  background:#f5f5f5;
  padding:15px;
  margin-top:10px;
}

/* ===== CONTENIDO ===== */
.news-content{
  padding:18px;
  text-align:center;
  display:flex;
  flex-direction:column;
  align-items:center;
}

.news-content h3{
  font-size:1rem;
  margin-bottom:20px;
  min-height:60px;
}

/* ===== BOTÓN MEJORADO ===== */
.news-btn{
  display:inline-block;
  padding:12px 22px;
  background:linear-gradient(135deg,#046994,#0b1c2c);
  color:white;
  border-radius:30px;
  font-size:0.9rem;
  font-weight:700;
  text-decoration:none;
  text-align:center;
  transition:0.3s;
  min-width:120px;
}

.news-btn:hover{
  transform:scale(1.05);
  box-shadow:0 6px 18px rgba(0,0,0,0.2);
}

/* ===== BOTONES SLIDE ===== */
.nav-btn{
  position:absolute;
  top:50%;
  transform:translateY(-50%);
  background:rgba(0,0,0,0.6);
  color:white;
  border:none;
  font-size:18px;
  padding:10px;
  cursor:pointer;
  border-radius:50%;
  z-index:5;
}

.prev{ left:10px; }
.next{ right:10px; }

/* ===== FEDERACIONES ===== */
.fed-grid{
  display:grid;
  grid-template-columns: repeat(auto-fit, minmax(180px,1fr));
  gap:25px;
  margin-top:50px;
}

.fed-card{
  background:white;
  border-radius:16px;
  padding:25px;
  text-align:center;
  box-shadow:0 10px 25px rgba(0,0,0,0.08);
  transition:0.3s;
  display:flex;
  flex-direction:column;
  align-items:center;
}

.fed-card:hover{
  transform:scale(1.05);
}

.fed-card img{
  width:100px;
  height:100px;
  object-fit:contain;
  margin-bottom:15px;
}

.fed-card a{
  text-decoration:none;
  color:#0b1c2c;
  font-weight:600;
  display:flex;
  flex-direction:column;
  align-items:center;
  font-size:1rem;
}

#murcia-logo{
  width:130px;   /* más ancho */
  height:130px;  /* más alto */
}

/* ===== RESPONSIVE ===== */
@media(max-width:768px){
  .news-card img{ height:160px; width:85%; }
  .news-content h3{ font-size:0.95rem; }
  .news-btn{ font-size:0.85rem; padding:10px 18px; min-width:100px; }
  .fed-card img{ width:80px; height:80px; }
}

@media(max-width:480px){
  .news-card img{ height:140px; width:90%; }
  .news-content h3{ font-size:0.9rem; }
  .news-btn{ font-size:0.8rem; padding:8px 15px; min-width:90px; }
  .fed-card img{ width:70px; height:70px; }
}
</style>
</head>

<body>

<header class="header">
  <div class="header-container">
    <div>
      <h1>Surf Islas Canarias</h1>
      <p>Noticias del surf en Canarias y el mundo</p>
    </div>
    <nav class="nav">
      <a href="/">Inicio</a>
      <a href="/blog.html">Noticias</a>
      <a href="/islas.html">Islas</a>
      <a href="/campeonatos.html">Campeonatos</a>
      <a href="/modalidades.html">Modalidades</a>
      <a href="/about.html">Sobre nosotros</a>
      <a href="/contact.html">Contacto</a>
    </nav>
  </div>
</header>

<!-- ================== NOTICIAS ================== -->
<section class="section">
<h2>Noticias Federaciones</h2>

<div class="news-grid">

<!-- FESURF -->
<div class="news-card">
  <button class="nav-btn prev" onclick="prev('fesurf')"><</button>
  <button class="nav-btn next" onclick="next('fesurf')">></button>
  <img src="assets/img/logosfed/fesurf.jpg.png">
  <div class="news-content">
    <h3 id="fesurf-title"></h3>
    <a id="fesurf-link" class="news-btn" target="_blank">Leer noticia</a>
  </div>
</div>

<!-- FCSURF -->
<div class="news-card">
  <button class="nav-btn prev" onclick="prev('fcsurf')"><</button>
  <button class="nav-btn next" onclick="next('fcsurf')">></button>
  <img src="assets/img/logosfed/fcs_logo.png">
  <div class="news-content">
    <h3 id="fcsurf-title"></h3>
    <a id="fcsurf-link" class="news-btn" target="_blank">Leer noticia</a>
  </div>
</div>

</div>
</section>

<!-- ================== FEDERACIONES ================== -->
<section class="section">
<h2>Federaciones Regionales</h2>

<div class="fed-grid">
<div class="fed-card"><a href="https://www.federacionasturianadesurf.com" target="_blank"><img src="assets/img/logosfed/logos-fspa.png">FSPA</a></div>
<div class="fed-card"><a href="https://www.fgsurf.org/" target="_blank"><img src="assets/img/logosfed/logo-fgsurf.png">FGS</a></div>
<div class="fed-card"><a href="https://www.federacioncantabradesurf.com/" target="_blank"><img src="assets/img/logosfed/fcssnegro.PNG">FCS</a></div>
<div class="fed-card"><a href="https://fsrm.es/" target="_blank"><img id="murcia-logo" src="assets/img/logosfed/fsmazul.PNG">FSRM </a><a href="https://fsrm.es/" target="_blank"><img src="assets/img/logosfed/fsmazul.PNG">FSRM</a></div>
<div class="fed-card"><a href="https://www.facebook.com/AsociacionAndaluzaDeSurf" target="_blank"><img src="assets/img/logosfed/fedeanda.png">FEDEANDALSURF</a></div>
<div class="fed-card"><a href="https://fsurf.cat/" target="_blank"><img src="assets/img/logosfed/FSURFcat.png">FSURFCAT</a></div>
</div>
</section>

<footer class="footer">
  © 2026 Surf Islas Canarias
</footer>

<script>
const feeds = {
  fesurf: "https://api.rss2json.com/v1/api.json?rss_url=https://www.fesurf.es/feed/",
  fcsurf: "https://api.rss2json.com/v1/api.json?rss_url=https://fcsurf.es/feed/"
};

let store = { fesurf: [], fcsurf: [] };
let index = { fesurf:0, fcsurf:0 };

async function load(section){
  const res = await fetch(feeds[section]);
  const data = await res.json();

  store[section] = data.items.slice(0,5).map(item => ({
    title: item.title,
    link: item.link
  }));

  render(section);
}

function render(section){
  const item = store[section][index[section]];
  if(!item) return;

  document.getElementById(section+"-title").textContent = item.title;
  document.getElementById(section+"-link").href = item.link;
}

function next(section){
  index[section]++;
  if(index[section]>=store[section].length) index[section]=0;
  render(section);
}

function prev(section){
  index[section]--;
  if(index[section]<0) index[section]=store[section].length-1;
  render(section);
}

// auto slide
setInterval(()=>{
  next('fesurf');
  next('fcsurf');
},5000);

// refresco noticias cada 5 min
setInterval(()=>{
  load('fesurf');
  load('fcsurf');
},300000);

load('fesurf');
load('fcsurf');
</script>

</body>
</html>
