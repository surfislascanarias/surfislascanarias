<!DOCTYPE html>
<html lang="es">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Surf Islas Canarias</title>

<link rel="icon" type="image/png" href="/assets/img/sic-logo.png">

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">

<style>

/* ===== RESET ===== */
body {
  margin:0;
  font-family:'Inter', sans-serif;
}

/* ===== HEADER ===== */
.header {
  background:#000;
  color:#fff;
  padding:10px 20px;
}

.header-container {
  display:flex;
  justify-content:space-between;
  align-items:center;
  max-width:1400px;
  margin:auto;
}

/* LOGO */
.logo {
  display:flex;
  align-items:center;
  gap:15px;
}

.logo img {
  height:90px;
}

/* NAV */
.nav a {
  color:white;
  margin-left:15px;
  text-decoration:none;
}

/* REDES */
.socials {
  display:flex;
  gap:10px;
}

.socials a {
  color:white;
  font-size:18px;
}

/* ===== CAROUSEL ===== */
.carousel {
  position:relative;
  width:100%;
  height:70vh;
  overflow:hidden;
}

.carousel-track {
  display:flex;
  height:100%;
  transition:transform 0.6s ease;
}

.carousel-slide {
  min-width:100%;
  height:100%;
  display:flex;
  align-items:center;
  justify-content:center;
  color:white;
  text-decoration:none;
  position:relative;
}

.carousel-slide::after {
  content:"";
  position:absolute;
  inset:0;
  background:rgba(0,0,0,0.4);
}

.slide-content {
  position:relative;
  z-index:2;
  text-align:center;
}

.slide-content h3 {
  font-size:2rem;
}

/* FLECHAS */
.carousel-btn {
  position:absolute;
  top:50%;
  transform:translateY(-50%);
  background:rgba(0,0,0,0.5);
  border:none;
  color:white;
  font-size:2rem;
  padding:10px;
  cursor:pointer;
}

.prev { left:10px; }
.next { right:10px; }

/* DOTS */
.carousel-dots {
  position:absolute;
  bottom:15px;
  width:100%;
  text-align:center;
}

.dot {
  display:inline-block;
  width:12px;
  height:12px;
  margin:6px;
  background:white;
  border-radius:50%;
  opacity:0.5;
}

.dot.active {
  opacity:1;
}

/* ===== WINDY ===== */
.home-forecast {
  padding:40px 20px;
}

.grid {
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:20px;
  max-width:1400px;
  margin:auto;
}

.card iframe {
  width:100%;
  height:420px;
  border:none;
}

.card {
  border-radius:12px;
  overflow:hidden;
  box-shadow:0 10px 20px rgba(0,0,0,0.2);
}

.pad {
  text-align:center;
  padding:15px;
}

.btn {
  background:black;
  color:white;
  padding:10px 20px;
  text-decoration:none;
  border-radius:5px;
}

/* ===== RESPONSIVE ===== */
@media (max-width:768px){
  .grid {
    grid-template-columns:1fr;
  }

  .logo img {
    height:70px;
  }
}

</style>

</head>

<body>

<header class="header">
  <div class="header-container">

    <!-- IZQUIERDA -->
    <div class="socials">
      <a href="#">📸</a>
      <a href="#">🎵</a>
      <a href="#">▶️</a>
    </div>

    <!-- CENTRO LOGO -->
    <div class="logo">
      <img src="/assets/img/sic-logo.png">
      <div>
        <h1>Surf Islas Canarias</h1>
      </div>
    </div>

    <!-- DERECHA NAV -->
    <nav class="nav">
      <a href="/">Inicio</a>
      <a href="/blog.html">Noticias</a>
      <a href="/islas.html">Islas</a>
      <a href="/campeonatos.html">Eventos</a>
    </nav>

  </div>
</header>


<!-- CAROUSEL -->
<section class="carousel">

  <div class="carousel-track" id="track">

    <a href="/islas.html" class="carousel-slide" style="background:url('/assets/img/spots.jpg') center/cover;">
      <div class="slide-content"><h3>Spots por Islas</h3></div>
    </a>

    <a href="/modalidades.html" class="carousel-slide" style="background:url('/assets/img/modalidades.jpg') center/cover;">
      <div class="slide-content"><h3>Modalidades</h3></div>
    </a>

    <a href="/blog.html" class="carousel-slide" style="background:url('/assets/img/noticias.jpg') center/cover;">
      <div class="slide-content"><h3>Noticias</h3></div>
    </a>

    <a href="/campeonatos.html" class="carousel-slide" style="background:url('/assets/img/eventos.jpg') center/cover;">
      <div class="slide-content"><h3>Eventos</h3></div>
    </a>

  </div>

  <button class="carousel-btn prev" onclick="moveSlide(-1)">❮</button>
  <button class="carousel-btn next" onclick="moveSlide(1)">❯</button>

  <div class="carousel-dots" id="dots"></div>

</section>


<!-- WINDY -->
<section class="home-forecast">

  <h2 style="text-align:center;">Previsión del tiempo</h2>

  <div class="grid">

    <div class="card">
      <iframe src="https://embed.windy.com/embed2.html?lat=28.345&lon=-15.903&zoom=7&overlay=waves"></iframe>
      <div class="pad"><a href="https://www.windy.com/" class="btn">Ver más</a></div>
    </div>

    <div class="card">
      <iframe src="https://embed.windy.com/embed2.html?lat=28.345&lon=-15.903&zoom=7&overlay=wind"></iframe>
      <div class="pad"><a href="https://www.windy.com/" class="btn">Ver más</a></div>
    </div>

  </div>

</section>


<script>

// CAROUSEL
const track = document.getElementById('track');
const slides = document.querySelectorAll('.carousel-slide');
const dotsContainer = document.getElementById('dots');

let index = 0;

slides.forEach((_, i) => {
  const dot = document.createElement('span');
  dot.classList.add('dot');
  dot.onclick = () => goToSlide(i);
  dotsContainer.appendChild(dot);
});

const dots = document.querySelectorAll('.dot');

function updateCarousel() {
  track.style.transform = `translateX(-${index * 100}%)`;
  dots.forEach(d => d.classList.remove('active'));
  dots[index].classList.add('active');
}

function moveSlide(dir) {
  index = (index + dir + slides.length) % slides.length;
  updateCarousel();
}

function goToSlide(i) {
  index = i;
  updateCarousel();
}

setInterval(() => moveSlide(1), 5000);

updateCarousel();

// SWIPE
let startX = 0;

track.addEventListener('touchstart', e => {
  startX = e.touches[0].clientX;
});

track.addEventListener('touchend', e => {
  let endX = e.changedTouches[0].clientX;

  if (startX - endX > 50) moveSlide(1);
  if (endX - startX > 50) moveSlide(-1);
});

</script>

</body>
</html>
