<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Noticias Surf Islas Canarias</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">

<style>
body{
  margin:0;
  font-family:'Inter',sans-serif;
  background:#f5f5f5;
}

.header{
  background:linear-gradient(180deg,#046994,#023f5c);
  color:white;
  padding:20px;
}

.section{
  max-width:1000px;
  margin:40px auto;
}

.card{
  background:white;
  border-radius:12px;
  overflow:hidden;
  box-shadow:0 5px 15px rgba(0,0,0,0.1);
  position:relative;
}

.card img{
  width:100%;
  height:220px;
  object-fit:cover;
  background:#ccc;
}

.card-content{
  padding:15px;
}

.nav-btn{
  position:absolute;
  top:50%;
  transform:translateY(-50%);
  background:rgba(0,0,0,0.6);
  color:white;
  border:none;
  padding:10px;
  cursor:pointer;
}

.prev{ left:10px; }
.next{ right:10px; }
</style>
</head>

<body>

<header class="header">
  <h1>Surf Islas Canarias</h1>
</header>

<section class="section">
<h2>FESURFING</h2>
<div class="card">
<button class="nav-btn prev" onclick="prev('fesurf')"><</button>
<button class="nav-btn next" onclick="next('fesurf')">></button>
<img id="fesurf-img">
<div class="card-content">
<h3 id="fesurf-title"></h3>
<a id="fesurf-link" target="_blank">Ver noticia</a>
</div>
</div>
</section>

<section class="section">
<h2>WSL</h2>
<div class="card">
<button class="nav-btn prev" onclick="prev('wsl')"><</button>
<button class="nav-btn next" onclick="next('wsl')">></button>
<img id="wsl-img">
<div class="card-content">
<h3 id="wsl-title"></h3>
<a id="wsl-link" target="_blank">Ver noticia</a>
</div>
</div>
</section>

<script>

/* ================= FEEDS ================= */

const feeds = {
  fesurf: "https://api.rss2json.com/v1/api.json?rss_url=https://www.fesurf.es/feed/",
  wsl: "https://api.rss2json.com/v1/api.json?rss_url=https://www.worldsurfleague.com/rss/news"
};

let store = { fesurf:[], wsl:[] };
let index = { fesurf:0, wsl:0 };

/* ================= PROXY IMAGEN ================= */

function proxyImage(url){
  if(!url) return fallback();

  // arregla URLs relativas
  if(url.startsWith("/")){
    url = "https://www.fesurf.es" + url;
  }

  // proxy (CLAVE)
  return "https://images.weserv.nl/?url=" + encodeURIComponent(url);
}

function fallback(){
  return "https://via.placeholder.com/800x400/046994/ffffff?text=Surf+News";
}

/* ================= EXTRAER IMAGEN ================= */

function getImage(item){

  if(item.thumbnail) return proxyImage(item.thumbnail);

  let html = item.description || item.content;

  if(html){
    const match = html.match(/<img[^>]+src="([^">]+)"/);
    if(match) return proxyImage(match[1]);
  }

  return fallback();
}

/* ================= LOAD ================= */

async function load(section){
  const res = await fetch(feeds[section]);
  const data = await res.json();

  store[section] = data.items.map(item => ({
    title: item.title,
    link: item.link,
    img: getImage(item)
  }));

  update(section);
}

/* ================= RENDER ================= */

function render(section){
  const item = store[section][index[section]];
  if(!item) return;

  document.getElementById(section+"-img").src = item.img;
  document.getElementById(section+"-title").textContent = item.title;
  document.getElementById(section+"-link").href = item.link;
}

/* ================= CONTROL ================= */

function next(section){
  index[section]++;
  update(section);
}

function prev(section){
  index[section]--;
  update(section);
}

function update(section){
  const data = store[section];
  if(!data.length) return;

  if(index[section] >= data.length) index[section]=0;
  if(index[section] < 0) index[section]=data.length-1;

  render(section);
}

/* ================= AUTO ================= */

setInterval(()=>{
  next('fesurf');
  next('wsl');
},5000);

/* ================= INIT ================= */

load('fesurf');
load('wsl');

</script>

</body>
</html>
