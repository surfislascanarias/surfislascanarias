<!DOCTYPE html>
<html lang="es">

<head>

  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <title>Surf Islas Canarias</title>

  <!-- FAVICON -->
  <link rel="icon" type="image/png" href="/assets/img/sic-logo.png">

  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">

  <link rel="stylesheet" href="/assets/css/style.css">

  <style>
  /* SOLO añadidos, no rompe tu CSS */

  .logo img {
    height:80px;
  }

  .socials {
    position:absolute;
    top:10px;
    left:10px;
    z-index:1000;
  }

  .socials a {
    margin-right:10px;
    font-size:18px;
    text-decoration:none;
  }

  /* CAROUSEL */
  .carousel {
    position:relative;
    width:100%;
    height:60vh;
    overflow:hidden;
  }

  .carousel-track {
    display:flex;
    transition:transform 0.5s ease;
    height:100%;
  }

  .carousel-slide {
    min-width:100%;
    height:100%;
    display:flex;
    align-items:center;
    justify-content:center;
    color:white;
    text-decoration:none;
    position:relative;
  }

  .carousel-slide::after {
    content:"";
    position:absolute;
    inset:0;
    background:rgba(0,0,0,0.4);
  }

  .slide-content {
    position:relative;
    z-index:2;
    text-align:center;
  }

  .carousel-btn {
    position:absolute;
    top:50%;
    transform:translateY(-50%);
    background:rgba(0,0,0,0.5);
    border:none;
    color:white;
    font-size:2rem;
    padding:10px;
    cursor:pointer;
  }

  .prev { left:10px; }
  .next { right:10px; }

  .carousel-dots {
    position:absolute;
    bottom:10px;
    width:100%;
    text-align:center;
  }

  .dot {
    display:inline-block;
    width:10px;
    height:10px;
    margin:5px;
    background:white;
    border-radius:50%;
    opacity:0.5;
  }

  .dot.active {
    opacity:1;
  }

  /* WINDY MÁS GRANDE */
  .home-forecast .grid {
    grid-template-columns:1fr 1fr;
  }

  .home-forecast iframe {
    height:420px !important;
  }

  @media(max-width:768px){
    .home-forecast .grid {
      grid-template-columns:1fr;
    }
  }

  </style>

</head>

<body>

<!-- REDES -->
<div class="socials">
  <a href="#">📸</a>
  <a href="#">🎵</a>
  <a href="#">▶️</a>
</div>

<header class="header">

  <div class="header-container">

    <div class="logo">
      <img src="/assets/img/sic-logo.png">
      <div>
        <h1>Surf Islas Canarias</h1>
        <p>La comunidad del surf canario, desde dentro</p>
      </div>
    </div>

    <button class="menu-toggle" id="menuToggle">☰</button>

    <nav class="nav" id="navMenu">
      <a href="/">Inicio</a>
      <a href="/blog.html">Noticias</a>
      <a href="/islas.html">Islas</a>
      <a href="/campeonatos.html">Campeonatos</a>
      <a href="/modalidades.html">Modalidades</a>
      <a href="/about.html">Sobre nosotros</a>
      <a href="/contact.html">Contacto</a>
    </nav>

  </div>

</header>


<main>

<!-- 🔥 REEMPLAZA TUS CARDS POR ESTO -->
<section class="carousel">

  <div class="carousel-track" id="track">

    <a href="/islas.html" class="carousel-slide" style="background:url('/assets/img/spots.jpg') center/cover;">
      <div class="slide-content">
        <h3>Spots por Islas</h3>
      </div>
    </a>

    <a href="/modalidades.html" class="carousel-slide" style="background:url('/assets/img/modalidades.jpg') center/cover;">
      <div class="slide-content">
        <h3>Modalidades</h3>
      </div>
    </a>

    <a href="/blog.html" class="carousel-slide" style="background:url('/assets/img/noticias.jpg') center/cover;">
      <div class="slide-content">
        <h3>Noticias & Cultura</h3>
      </div>
    </a>

    <a href="/campeonatos.html" class="carousel-slide" style="background:url('/assets/img/eventos.jpg') center/cover;">
      <div class="slide-content">
        <h3>Eventos & Campeonatos</h3>
      </div>
    </a>

  </div>

  <button class="carousel-btn prev" onclick="moveSlide(-1)">❮</button>
  <button class="carousel-btn next" onclick="moveSlide(1)">❯</button>

  <div class="carousel-dots" id="dots"></div>

</section>


<!-- TU WINDY ORIGINAL (solo más grande) -->
<section class="home-forecast container">
  <h2>Previsión del tiempo</h2>
  <div class="grid">

    <div class="card">
      <iframe src="https://embed.windy.com/embed2.html?lat=28.345&lon=-15.903&zoom=7&overlay=waves"></iframe>
    </div>

    <div class="card">
      <iframe src="https://embed.windy.com/embed2.html?lat=28.345&lon=-15.903&zoom=7&overlay=wind"></iframe>
    </div>

  </div>
</section>

</main>

<script>

// CAROUSEL
const track = document.getElementById('track');
const slides = document.querySelectorAll('.carousel-slide');
const dotsContainer = document.getElementById('dots');

let index = 0;

slides.forEach((_, i) => {
  const dot = document.createElement('span');
  dot.classList.add('dot');
  dot.onclick = () => goToSlide(i);
  dotsContainer.appendChild(dot);
});

const dots = document.querySelectorAll('.dot');

function updateCarousel() {
  track.style.transform = `translateX(-${index * 100}%)`;
  dots.forEach(d => d.classList.remove('active'));
  dots[index].classList.add('active');
}

function moveSlide(dir) {
  index = (index + dir + slides.length) % slides.length;
  updateCarousel();
}

function goToSlide(i) {
  index = i;
  updateCarousel();
}

setInterval(() => moveSlide(1), 5000);

updateCarousel();

// SWIPE
let startX = 0;

track.addEventListener('touchstart', e => {
  startX = e.touches[0].clientX;
});

track.addEventListener('touchend', e => {
  let endX = e.changedTouches[0].clientX;

  if (startX - endX > 50) moveSlide(1);
  if (endX - startX > 50) moveSlide(-1);
});

// MENU
const toggle = document.getElementById("menuToggle");
const nav = document.getElementById("navMenu");

toggle.addEventListener("click", () => {
  nav.classList.toggle("active");
});

</script>

</body>
</html>
